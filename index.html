.nav-links{display:flex;gap:2rem;list-style:none;}

#hero{ min-height:100vh; display:flex;flex-direction:column; justify-content:center;align-items:center; text-align:center; padding:8rem 2rem 4rem; position:relative; overflow:hidden; z-index:2; }

<script type="py">
from pyscript import document
import random

class KantoEngine:
    def __init__(self):
        self.terminal = document.getElementById("game-terminal")
        self.input = document.getElementById("game-input")
        self.pokemon = [
            {"name": "Pikachu", "hp": 100, "moves": [{"n": "Thunderbolt", "d": (20,30)}, {"n": "Quick Attack", "d": (10,15)}]},
            {"name": "Charmander", "hp": 90, "moves": [{"n": "Ember", "d": (15,25)}, {"n": "Scratch", "d": (10,12)}]},
            {"name": "Squirtle", "hp": 110, "moves": [{"n": "Water Gun", "d": (15,20)}, {"n": "Tackle", "d": (10,15)}]}
        ]
        self.player = None
        self.enemy = None
        self.state = "START"

    def log(self, text, color="white"):
        div = document.createElement("div")
        div.style.color = color
        div.style.marginBottom = "5px"
        div.innerHTML = f"> {text}"
        self.terminal.appendChild(div)
        self.terminal.scrollTop = self.terminal.scrollHeight

    def start(self):
        self.log("WELCOME TO ADARSH'S KANTO ENGINE", "#FFD700")
        self.log("Pick your starter: [1] Pikachu [2] Charmander [3] Squirtle")
        self.state = "PICK"

    def handle_input(self, event):
        val = self.input.value.strip()
        self.input.value = ""
        
        if self.state == "PICK":
            if val in ["1", "2", "3"]:
                self.player = dict(self.pokemon[int(val)-1])
                self.enemy = dict(random.choice(self.pokemon))
                self.log(f"Go! {self.player['name']}!", "#2ecc71")
                self.log(f"Wild {self.enemy['name']} appeared!", "#e74c3c")
                self.log(f"Moves: [1] {self.player['moves'][0]['n']} [2] {self.player['moves'][1]['n']}")
                self.state = "BATTLE"
        
        elif self.state == "BATTLE":
            if val in ["1", "2"]:
                # Player Attack
                move = self.player['moves'][int(val)-1]
                dmg = random.randint(*move['d'])
                self.enemy['hp'] -= dmg
                self.log(f"{self.player['name']} used {move['n']}! ({dmg} DMG)")
                
                if self.enemy['hp'] <= 0:
                    self.log("VICTORY! Enemy fainted.", "#FFD700")
                    self.state = "PICK"
                    self.log("Press 1 to restart.")
                    return

                # Enemy Attack
                e_move = random.choice(self.enemy['moves'])
                e_dmg = random.randint(*e_move['d'])
                self.player['hp'] -= e_dmg
                self.log(f"{self.enemy['name']} used {e_move['n']}! ({e_dmg} DMG)", "#ff7060")
                self.log(f"HP: {self.player['hp']} | ENEMY: {self.enemy['hp']}")

engine = KantoEngine()
document.getElementById("game-submit").onclick = engine.handle_input
engine.start()
</script>

<script>
// Keep your existing custom cursor and stars JavaScript here
const cur = document.getElementById('cur');
const ring = document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  cur.style.transform=`translate(${mx-6}px,${my-6}px)`;
});
(function animateRing(){
  rx+=(mx-rx-16)*0.1;
  ry+=(my-ry-16)*0.1;
  ring.style.transform=`translate(${rx}px,${ry}px)`;
  requestAnimationFrame(animateRing);
})();
// (Add your starfield and particle JS back here)
</script>
